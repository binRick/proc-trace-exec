<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1c1400"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="1.5"/></filter>
    <marker id="arr" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto">
      <path d="M0,0 L5,2.5 L0,5 Z" fill="#f59e0b" opacity="0.7"/>
    </marker>
  </defs>

  <!-- outer ring -->
  <circle cx="100" cy="100" r="96" fill="url(#bg)" stroke="#f59e0b" stroke-width="1.2" stroke-opacity="0.4"/>

  <!-- glow backdrop -->
  <circle cx="100" cy="96" r="75" fill="url(#glow)" filter="url(#blur)"/>

  <!-- subtle grid lines -->
  <line x1="30" y1="70"  x2="170" y2="70"  stroke="#f59e0b" stroke-width="0.4" stroke-opacity="0.08"/>
  <line x1="30" y1="108" x2="170" y2="108" stroke="#f59e0b" stroke-width="0.4" stroke-opacity="0.08"/>
  <line x1="30" y1="146" x2="170" y2="146" stroke="#f59e0b" stroke-width="0.4" stroke-opacity="0.08"/>

  <!-- ── Tree edges ── -->
  <!-- root → left child -->
  <line x1="100" y1="55" x2="62"  y2="98"  stroke="#f59e0b" stroke-width="1.6" stroke-opacity="0.7" marker-end="url(#arr)"/>
  <!-- root → right child -->
  <line x1="100" y1="55" x2="140" y2="98"  stroke="#f59e0b" stroke-width="1.6" stroke-opacity="0.7" marker-end="url(#arr)"/>
  <!-- left → left-left grandchild -->
  <line x1="62"  y1="108" x2="40"  y2="148" stroke="#fbbf24" stroke-width="1.3" stroke-opacity="0.6" marker-end="url(#arr)"/>
  <!-- left → left-right grandchild -->
  <line x1="62"  y1="108" x2="84"  y2="148" stroke="#fbbf24" stroke-width="1.3" stroke-opacity="0.6" marker-end="url(#arr)"/>
  <!-- right → right grandchild -->
  <line x1="140" y1="108" x2="140" y2="148" stroke="#fbbf24" stroke-width="1.3" stroke-opacity="0.6" marker-end="url(#arr)"/>
  <!-- left-right grandchild → great-grandchild -->
  <line x1="84"  y1="158" x2="84"  y2="175" stroke="#fde68a" stroke-width="1.1" stroke-opacity="0.5" marker-end="url(#arr)"/>

  <!-- ── Nodes ── -->

  <!-- Root node — largest, brightest -->
  <circle cx="100" cy="46" r="11" fill="#78350f" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="100" cy="46" r="11" fill="rgba(245,158,11,0.12)" filter="url(#blur2)"/>
  <circle cx="100" cy="46" r="5"  fill="#fbbf24"/>
  <circle cx="100" cy="46" r="2"  fill="#fef3c7"/>

  <!-- Level 1 — left -->
  <circle cx="62"  cy="103" r="8.5" fill="#78350f" stroke="#f59e0b" stroke-width="1.6"/>
  <circle cx="62"  cy="103" r="3.8" fill="#fbbf24"/>
  <circle cx="62"  cy="103" r="1.5" fill="#fef3c7"/>

  <!-- Level 1 — right -->
  <circle cx="140" cy="103" r="8.5" fill="#78350f" stroke="#f59e0b" stroke-width="1.6"/>
  <circle cx="140" cy="103" r="3.8" fill="#fbbf24"/>
  <circle cx="140" cy="103" r="1.5" fill="#fef3c7"/>

  <!-- Level 2 — left-left -->
  <circle cx="40"  cy="153" r="7" fill="#451a03" stroke="#d97706" stroke-width="1.3"/>
  <circle cx="40"  cy="153" r="3" fill="#fbbf24" fill-opacity="0.85"/>

  <!-- Level 2 — left-right -->
  <circle cx="84"  cy="153" r="7" fill="#451a03" stroke="#d97706" stroke-width="1.3"/>
  <circle cx="84"  cy="153" r="3" fill="#fbbf24" fill-opacity="0.85"/>

  <!-- Level 2 — right -->
  <circle cx="140" cy="153" r="7" fill="#451a03" stroke="#d97706" stroke-width="1.3"/>
  <circle cx="140" cy="153" r="3" fill="#fbbf24" fill-opacity="0.85"/>

  <!-- Level 3 — great-grandchild -->
  <circle cx="84"  cy="180" r="5.5" fill="#1c0a00" stroke="#92400e" stroke-width="1.2"/>
  <circle cx="84"  cy="180" r="2.2" fill="#fbbf24" fill-opacity="0.7"/>

  <!-- depth indicator lines (left margin, like terminal indentation) -->
  <line x1="22" y1="40"  x2="22" y2="60"  stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.35" stroke-linecap="round"/>
  <line x1="22" y1="96"  x2="22" y2="116" stroke="#f59e0b" stroke-width="1.2" stroke-opacity="0.25" stroke-linecap="round"/>
  <line x1="22" y1="145" x2="22" y2="162" stroke="#f59e0b" stroke-width="0.9" stroke-opacity="0.18" stroke-linecap="round"/>

  <!-- animated pulse from root -->
  <circle cx="100" cy="46" r="13" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.5">
    <animate attributeName="r"       from="11"  to="34"  dur="2.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.5"  to="0"  dur="2.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="46" r="13" fill="none" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.3">
    <animate attributeName="r"       from="11"  to="52"  dur="2.6s" begin="0.85s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.3"  to="0"  dur="2.6s" begin="0.85s" repeatCount="indefinite"/>
  </circle>
</svg>
